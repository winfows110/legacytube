<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LegacyTube - The Best YouTube Player for Xperia Tablet</title>
    <style>
        :root {
            --primary-color: #ff0000; /* YouTube Red */
            --accent-color: #00e5ff;  /* Xperia Cyan */
            --bg-color: #0f0f0f;
            --text-color: #ffffff;
            --card-bg: #1e1e1e;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        /* ヒーローセクション */
        header {
            padding: 6rem 2rem;
            text-align: center;
            background: radial-gradient(circle at center, #2c0000 0%, #0f0f0f 100%);
            border-bottom: 1px solid #333;
        }

        .logo-text {
            font-size: 4rem;
            font-weight: 900;
            margin: 0;
            letter-spacing: -2px;
            background: linear-gradient(to right, #ff0000, #ff6666);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 1.4rem;
            margin-top: 1rem;
            opacity: 0.9;
            font-weight: 300;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 3rem 2rem;
        }

        /* 特徴セクション */
        .feature-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
            margin: 4rem 0;
        }

        .feature-card {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 16px;
            transition: transform 0.3s;
            border: 1px solid #333;
        }

        .feature-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary-color);
        }

        .feature-card h3 {
            color: var(--primary-color);
            margin-top: 0;
            font-size: 1.5rem;
        }
